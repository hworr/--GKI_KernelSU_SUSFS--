name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'

runs:
  using: composite
  steps:
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ -f "build/build.sh" ]; then
        SKIP_MRPROPER=1 \
        LTO=thin \
        GKI_DEFCONFIG_FRAGMENT="$GITHUB_WORKSPACE/wild_gki.fragment" \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="$CC" \
        CXX="$CXX" \
        HOSTCC="$HOSTCC" \
        HOSTCXX="$HOSTCXX" \
        LD="$LD" \
        HOSTLD="$HOSTLD"
      else
        cp "$GITHUB_WORKSPACE/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
        tools/bazel build \
          --config=release \
          --notrim \
          --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment \
          --disk_cache=$LDCACHE_DIR \
          --cache_dir=$GITHUB_WORKSPACE/kernel/.cache/bazel \
          //common:kernel_aarch64
      fi
