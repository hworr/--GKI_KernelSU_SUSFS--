name: 'Extract Sublevel and File Name'
description: 'Reads Makefile sublevel and composes FILE_NAME'
inputs:
  kernel_version:
    required: true
    type: string
  android_version:
    required: true
    type: string
  os_patch_level:
    required: true
    type: string
  variant:
    required: true
    type: string
  config_variant:
    required: false
    type: string
  sublevel:
    required: true
    type: string
outputs:
  file_name:
    value: ${{ steps.extract.outputs.file_name }}
  sublevel:
    value: ${{ steps.extract.outputs.sublevel }}

runs:
  using: composite
  steps:
    - id: extract
      shell: bash
      run: |
        set -euo pipefail

        SUBLEVEL="${{ inputs.sublevel }}"
        if [ -f "${{ github.workspace }}/kernel/common/Makefile" ]; then
          EXTRACTED="$(grep '^SUBLEVEL = ' "${{ github.workspace }}/kernel/common/Makefile" | awk '{print $3}')"
          if [ "${{ inputs.os_patch_level }}" = "lts" ] && [ -n "$EXTRACTED" ]; then
            SUBLEVEL="$EXTRACTED"
          fi
        fi

        FILE_NAME="${{ inputs.kernel_version }}.${SUBLEVEL}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}-${{ inputs.variant }}"
        if [ -n "${{ inputs.config_variant || '' }}" ]; then
          FILE_NAME="${FILE_NAME}-${{ inputs.config_variant }}"
        fi

        echo "SUBLEVEL=$SUBLEVEL" >> "$GITHUB_ENV"
        echo "FILE_NAME=$FILE_NAME" >> "$GITHUB_ENV"

        echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
        echo "sublevel=$SUBLEVEL" >> "$GITHUB_OUTPUT"
